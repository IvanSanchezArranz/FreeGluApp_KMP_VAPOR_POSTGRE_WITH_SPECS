name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Tests (Vapor)
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Setup PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          postgres-version: '15'
          username: 'admin'
          password: 'admin'
          database: 'glutenfree'

      - name: Run Backend Tests
        run: |
          cd GlutenFreeAPI
          swift test

  kmp-build:
    name: Kotlin Multiplatform Build
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build and Test KMP Shared Library
        run: |
          cd FreeGluKMP
          ./gradlew clean build -x test -x check
