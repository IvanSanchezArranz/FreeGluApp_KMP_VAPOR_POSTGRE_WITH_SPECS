name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Tests (Vapor)
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Setup PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          postgres-version: '15'
          username: 'admin'
          password: 'admin'
          database: 'glutenfree_test'

      - name: Run Backend Tests
        run: |
          cd GlutenFreeAPI
          swift test

      - name: Trigger Render Deploy
        if: github.ref == 'refs/heads/main' && success()
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "🚀 Triggering Render deployment..."
            curl -f -X POST "$RENDER_DEPLOY_HOOK"
          else
            echo "⚠️ RENDER_DEPLOY_HOOK secret is not set in GitHub Repository Secrets. Skipping deploy hook trigger."
          fi

  kmp-build:
    name: Kotlin Multiplatform Build
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Configure Production Environment Toggle (AUTO)
        run: |
          python3 -c "
          with open('FreeGluKMP/shared/src/commonMain/kotlin/com/ivan/freeglukmp/Platform.kt', 'r') as f:
              text = f.read()
          text = text.replace('val CURRENT_ENVIRONMENT = AppEnvironment.LOCAL', 'val CURRENT_ENVIRONMENT = AppEnvironment.AUTO')
          with open('FreeGluKMP/shared/src/commonMain/kotlin/com/ivan/freeglukmp/Platform.kt', 'w') as f:
              f.write(text)
          "

      - name: Build and Test KMP Shared Library
        run: |
          cd FreeGluKMP
          ./gradlew clean build -x test -x check
